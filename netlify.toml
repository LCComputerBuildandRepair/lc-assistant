# Netlify configuration for LC Computer Build & Repair.
# The Next.js runtime plugin turns the app's pages/API routes into serverless
# functions. Postgres (Neon) is the database; `db push` on build keeps its
# schema in sync. Set DATABASE_URL (Neon pooled connection string) in the
# Netlify UI under Site settings → Environment variables.

[build]
  command = "npx prisma generate && npx prisma db push && npm run build"

[build.environment]
  NODE_VERSION = "20"
  # These are non-secret (a public API URL, a model name, and the public
  # business email that's shown on the site) but appear as literals in the code,
  # which trips Netlify's secrets scanner. Exclude them; real secrets
  # (DATABASE_URL, AI_API_KEY, etc.) never appear in the code and stay scanned.
  SECRETS_SCAN_OMIT_KEYS = "AI_BASE_URL,AI_MODEL,OWNER_EMAIL,OWNER_PHONE,MAIL_USER,MAIL_PROVIDER,SMS_PROVIDER,OWNER_CARRIER_GATEWAY,NOTIFY_FROM_EMAIL,ALLOWED_ORIGIN,TZ"

[[plugins]]
  package = "@netlify/plugin-nextjs"
